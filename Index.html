<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Oficial</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        img { max-width: 100%; height: auto; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <img id="fotoRIF" src="">
    <script>
        const imagenCargada = localStorage.getItem('temp_rif');
        if(imagenCargada) {
            document.getElementById('fotoRIF').src = imagenCargada;
        } else {
            document.write("<h2 style='color:white; font-family:sans-serif; text-align:center;'>No hay información disponible.</h2>");
        }
    </script>
</body>
</html>
