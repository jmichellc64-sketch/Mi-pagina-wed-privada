<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rifconsultacertificado</title>
    <!-- Librería para generar el QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: white; color: black; text-align: center; padding: 20px; }
        .hidden { display: none; }
        input, button { margin: 10px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { background: black; color: white; cursor: pointer; font-weight: bold; }
        img { max-width: 100%; height: auto; margin-top: 20px; display: block; margin-left: auto; margin-right: auto; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
        .texto-principal { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- PANTALLA DE ACCESO: SOLO PARA TU USO -->
    <div id="loginSection">
        <div class="texto-principal">rifconsultacertificado</div>
        <input type="password" id="passInput" placeholder="Ingrese clave">
        <button onclick="checkPass()">Entrar</button>
    </div>

    <!-- PANTALLA PRIVADA -->
    <div id="mainSection" class="hidden">
        <div class="texto-principal">rifconsultacertificado</div>
        
        <div id="uploadArea">
            <input type="file" id="fileInput" accept="image/*">
            <button onclick="saveRIF()">Guardar RIF en la Web</button>
        </div>

        <div id="displayArea">
            <div id="imageContainer"></div>
        </div>

        <hr style="margin: 40px 0;">
        <button onclick="generateQR()" style="background: #0056b3;">Generar Código QR</button>
        <div id="qrcode"></div>
    </div>

    <script>
        const CLAVE_ACCESO = "18712529";

        function checkPass() {
            if (document.getElementById('passInput').value === CLAVE_ACCESO) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                loadRIF();
            } else {
                alert("Clave incorrecta");
            }
        }

        function saveRIF() {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = function() {
                    // Guarda la imagen para que permanezca en la web
                    localStorage.setItem('user_rif_image', reader.result);
                    loadRIF();
                }
                reader.readAsDataURL(file);
            }
        }

        function loadRIF() {
            const savedImage = localStorage.getItem('user_rif_image');
            const container = document.getElementById('imageContainer');
            if (savedImage) {
                container.innerHTML = '<img src="' + savedImage + '">';
                document.getElementById('uploadArea').classList.add('hidden');
            }
        }

        function generateQR() {
            document.getElementById('qrcode').innerHTML = ""; 
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 180,
                height: 180
            });
        }
    </script>
</body>
</html>
