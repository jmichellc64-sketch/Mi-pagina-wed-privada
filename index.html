<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rifconsultacertificado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: white; color: black; margin: 0; padding: 0; text-align: center; }
        img { width: 100%; height: auto; display: block; margin: 0 auto; }
        .hidden { display: none; }
        
        /* Zona secreta: Toca 5 veces el centro de la pantalla para que pida clave */
        #zonaSecreta { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Panel de administración */
        #adminPanel { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 2px solid black; padding: 20px; z-index: 100; border-radius: 15px;
        }
        input, button { margin: 10px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: black; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Esta zona detecta tus toques para abrir el panel -->
    <div id="zonaSecreta" onclick="detectarToques()"></div>

    <!-- VISTA PÚBLICA: Lo que ve CUALQUIERA que escanee el QR -->
    <div id="vistaPublica">
        <div id="contenedorRif">
            <p style="padding-top: 50px; color: gray;">Cargando información...</p>
        </div>
    </div>

    <!-- PANEL PRIVADO: Solo aparece con tus toques -->
    <div id="adminPanel" class="hidden">
        <h3>Panel de Control</h3>
        <input type="password" id="claveInput" placeholder="Introduce clave">
        <div id="herramientasAdmin" class="hidden">
            <input type="file" id="subirImagen" accept="image/*">
            <button onclick="guardarImagen()">1. Guardar Imagen</button>
            <br>
            <button onclick="generarQR()" style="background: #0056b3;">2. Generar Código QR</button>
            <div id="areaQr" style="margin-top:10px; display:flex; justify-content:center;"></div>
        </div>
        <button id="btnEntrar" onclick="validarClave()">Entrar</button>
        <button onclick="cerrarAdmin()">Cerrar</button>
    </div>

    <script>
        const MI_CLAVE = "18712529";
        let contadorToques = 0;

        // 1. CARGA AUTOMÁTICA (Para que el público vea la imagen de una vez)
        window.onload = function() {
            const data = localStorage.getItem('imagen_rif_permanente');
            if (data) {
                document.getElementById('contenedorRif').innerHTML = '<img src="' + data + '">';
            }
        };

        // 2. SISTEMA DE ENTRADA PRIVADA (Solo para ti)
        function detectarToques() {
            contadorToques++;
            if (contadorToques === 5) { // Toca 5 veces cualquier parte para abrir
                document.getElementById('adminPanel').classList.remove('hidden');
                contadorToques = 0;
            }
        }

        function validarClave() {
            if (document.getElementById('claveInput').value === MI_CLAVE) {
                document.getElementById('herramientasAdmin').classList.remove('hidden');
                document.getElementById('btnEntrar').classList.add('hidden');
                document.getElementById('claveInput').classList.add('hidden');
            } else {
                alert("Clave incorrecta");
            }
        }

        function guardarImagen() {
            const file = document.getElementById('subirImagen').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = function() {
                    localStorage.setItem('imagen_rif_permanente', reader.result);
                    alert("Imagen guardada. Ahora el público la verá al escanear.");
                    location.reload();
                }
                reader.readAsDataURL(file);
            }
        }

        function generarQR() {
            document.getElementById('areaQr').innerHTML = "";
            new QRCode(document.getElementById("areaQr"), {
                text: window.location.href,
                width: 150,
                height: 150
            });
        }

        function cerrarAdmin() {
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('herramientasAdmin').classList.add('hidden');
            document.getElementById('btnEntrar').classList.remove('hidden');
            document.getElementById('claveInput').classList.remove('hidden');
            document.getElementById('claveInput').value = "";
        }
    </script>
</body>
</html>
