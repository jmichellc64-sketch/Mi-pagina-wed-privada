<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rifconsultacertificado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: white; margin: 0; text-align: center; }
        img { width: 100%; height: auto; display: block; }
        .hidden { display: none; }
        #adminPanel { position: fixed; bottom: 0; width: 100%; background: #eee; padding: 20px; border-top: 2px solid #ccc; z-index: 100; }
        input, button { padding: 12px; margin: 5px; border-radius: 8px; border: 1px solid #999; }
        button { background: black; color: white; cursor: pointer; font-weight: bold; }
        .trigger { height: 50px; width: 100%; position: absolute; top: 0; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Zona invisible arriba para tu clave -->
    <div class="trigger" onclick="abrirAdmin()"></div>

    <!-- LO QUE VE EL PÚBLICO -->
    <div id="visor">
        <div id="mensaje" style="padding: 50px; color: gray;">
            Esperando carga de certificado...
        </div>
    </div>

    <!-- PANEL PARA TI -->
    <div id="panel" class="hidden">
        <div id="adminPanel">
            <input type="password" id="miClave" placeholder="Tu clave: 18712529">
            <button onclick="entrar()">Entrar</button>
            
            <div id="controles" class="hidden">
                <p>Selecciona la foto de tu RIF:</p>
                <input type="file" id="inputFoto" accept="image/*">
                <button onclick="procesar()">Guardar y Mostrar</button>
                <br>
                <button onclick="generarQR()" style="background: #0056b3;">Generar QR</button>
                <div id="qrcode" style="display:flex; justify-content:center; margin-top:10px;"></div>
            </div>
            <button onclick="cerrar()">Cerrar</button>
        </div>
    </div>

    <script>
        const CLAVE_CORRECTA = "18712529";

        // Al abrir la web, busca si ya guardaste una foto
        window.onload = function() {
            const fotoGuardada = localStorage.getItem('mi_rif_foto');
            if (fotoGuardada) {
                document.getElementById('visor').innerHTML = '<img src="' + fotoGuardada + '">';
            }
        };

        function abrirAdmin() { document.getElementById('panel').classList.remove('hidden'); }
        function cerrar() { document.getElementById('panel').classList.add('hidden'); }

        function entrar() {
            if (document.getElementById('miClave').value === CLAVE_CORRECTA) {
                document.getElementById('controles').classList.remove('hidden');
            } else {
                alert("Clave incorrecta");
            }
        }

        function procesar() {
            const archivo = document.getElementById('inputFoto').files[0];
            if (archivo) {
                const leer = new FileReader();
                leer.onloadend = function() {
                    // Esto guarda la foto en la memoria del navegador
                    localStorage.setItem('mi_rif_foto', leer.result);
                    alert("¡Guardado con éxito!");
                    location.reload();
                }
                leer.readAsDataURL(archivo);
            }
        }

        function generarQR() {
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), window.location.href);
        }
    </script>
</body>
</html>
