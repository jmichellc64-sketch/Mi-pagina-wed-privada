<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Acceso Privado</title>
<style>
  body, html {
    margin: 0; padding: 0; height: 100%; background: white; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif;
  }
  #accessForm, #uploadSection {
    display: none;
    text-align: center;
  }
  input[type="password"], input[type="file"] {
    margin: 10px 0;
    padding: 8px;
    width: 200px;
  }
  button {
    padding: 8px 16px;
    cursor: pointer;
  }
  #qrCode {
    margin-top: 20px;
  }
</style>
</head>
<body>

<!-- Acceso -->
<div id="accessForm">
  <h2>Ingrese la clave</h2>
  <input type="password" id="clave" placeholder="Clave" autocomplete="off" />
  <br />
  <button onclick="validateClave()">Entrar</button>
  <p id="errorMsg" style="color:red;"></p>
</div>

<!-- Subir imagen y generar QR -->
<div id="uploadSection">
  <h2>Subir imagen</h2>
  <input type="file" id="fileInput" accept="image/*" />
  <br />
  <button onclick="generateQR()">Generar Código QR</button>
  <div id="qrCode"></div>
</div>

<!-- Librería QR -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  let tapCount = 0;
  const requiredTaps = 5;
  const accessForm = document.getElementById('accessForm');
  const uploadSection = document.getElementById('uploadSection');
  const errorMsg = document.getElementById('errorMsg');
  const claveCorrecta = '18712529';
  let imageURL = '';

  // Detectar 5 toques para mostrar formulario
  document.body.addEventListener('touchstart', () => {
    tapCount++;
    if(tapCount === requiredTaps){
      accessForm.style.display = 'block';
      tapCount = 0;
    }
  });

  // Validar clave
  function validateClave(){
    const claveIngresada = document.getElementById('clave').value;
    if(claveIngresada === claveCorrecta){
      errorMsg.textContent = '';
      accessForm.style.display = 'none';
      uploadSection.style.display = 'block';
    } else {
      errorMsg.textContent = 'Clave incorrecta';
    }
  }

  // Subir imagen local y simular enlace (sin servidor real)
  document.getElementById('fileInput').addEventListener('change', function(event){
    const file = event.target.files[0];
    if(file){
      imageURL = URL.createObjectURL(file);
      alert('Imagen lista para generar QR');
    }
  });

  // Generar código QR para la imagen local
  function generateQR(){
    if(!imageURL){
      alert('Seleccione una imagen primero');
      return;
    }
    // Limpiar QR anterior
    const qrDiv = document.getElementById('qrCode');
    qrDiv.innerHTML = '';
    QRCode.toCanvas(imageURL, { width: 200 }, function (error, canvas) {
      if (error) alert('Error generando QR');
      else {
        qrDiv.appendChild(canvas);
      }
    });
  }
</script>
</body>
</html>
