<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Acceso Privado</title>
<style>
  body, html {
    margin: 0; padding: 0; height: 100%; background: white; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif;
  }
  #uploadSection {
    display: none;
    text-align: center;
  }
  input[type="password"], input[type="file"] {
    margin: 10px 0;
    padding: 8px;
    width: 200px;
  }
  button {
    padding: 8px 16px;
    cursor: pointer;
    margin-top: 10px;
  }
  #qrCode {
    margin-top: 20px;
  }
  #errorMsg {
    color: red;
  }
  #copyMsg {
    color: green;
    margin-top: 10px;
    font-weight: bold;
  }
</style>
</head>
<body>

<!-- Acceso -->
<div id="accessForm" style="text-align: center;">
  <h2>Ingrese la clave</h2>
  <input type="password" id="clave" placeholder="Clave" autocomplete="off" />
  <br />
  <button onclick="validateClave()">Entrar</button>
  <p id="errorMsg"></p>
</div>

<!-- Subir imagen y generar QR -->
<div id="uploadSection">
  <h2>Subir imagen</h2>
  <input type="file" id="fileInput" accept="image/*" />
  <br />
  <button onclick="generateQR()">Generar Código QR</button>
  <div id="qrCode"></div>
  <button id="copyButton" style="display:none;" onclick="copyQRCode()">Copiar enlace QR</button>
  <div id="copyMsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  const accessForm = document.getElementById('accessForm');
  const uploadSection = document.getElementById('uploadSection');
  const errorMsg = document.getElementById('errorMsg');
  const claveCorrecta = '18712529';
  let imageURL = '';

  function validateClave(){
    const claveIngresada = document.getElementById('clave').value;
    if(claveIngresada === claveCorrecta){
      errorMsg.textContent = '';
      accessForm.style.display = 'none';
      uploadSection.style.display = 'block';
    } else {
      errorMsg.textContent = 'Clave incorrecta';
    }
  }

  document.getElementById('fileInput').addEventListener('change', function(event){
    const file = event.target.files[0];
    if(file){
      imageURL = URL.createObjectURL(file);
      alert('Imagen lista para generar QR');
    }
  });

  function generateQR(){
    if(!imageURL){
      alert('Seleccione una imagen primero');
      return;
    }
    const qrDiv = document.getElementById('qrCode');
    qrDiv.innerHTML = '';
    QRCode.toCanvas(imageURL, { width: 200 }, function (error, canvas) {
      if (error) {
        alert('Error generando QR');
        document.getElementById('copyButton').style.display = 'none';
        return;
      }
      qrDiv.appendChild(canvas);
      document.getElementById('copyButton').style.display = 'inline-block';
      document.getElementById('copyMsg').textContent = '';
    });
  }

  function copyQRCode(){
    if (!imageURL) {
      alert('No hay enlace para copiar');
      return;
    }
    navigator.clipboard.writeText(imageURL).then(() => {
      document.getElementById('copyMsg').textContent = 'Enlace copiado al portapapeles';
    }).catch(() => {
      alert('Error al copiar');
    });
  }
</script>
</body>
</html>
