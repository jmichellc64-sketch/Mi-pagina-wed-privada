<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - RIF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .btn-blue { background: #0056b3; color: white; padding: 12px; border: none; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login">
            <h3>Acceso Privado</h3>
            <input type="password" id="pass" placeholder="Clave" style="width:90%; padding:10px;">
            <button class="btn-blue" onclick="entrar()">Entrar</button>
        </div>
        <div id="panel" class="hidden">
            <h3>Generador de RIF Permanente</h3>
            <input type="file" id="foto" accept="image/*" style="margin-top:10px;">
            <button class="btn-blue" onclick="crearQR()">GENERAR CÓDIGO QR</button>
            <div id="qrcode"></div>
        </div>
    </div>
    <script>
        function entrar() {
            if(document.getElementById('pass').value === "18712529") {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('panel').classList.remove('hidden');
            }
        }
        function crearQR() {
            const file = document.getElementById('foto').files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                const base64 = reader.result;
                // Guardamos la imagen localmente para que dure el tiempo que pidas
                localStorage.setItem('temp_rif', base64);
                
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), {
                    text: "https://contribuirteseniat.lat/visor.html",
                    width: 180, height: 180
                });
                alert("QR Generado. La imagen ahora es persistente.");
            }
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
